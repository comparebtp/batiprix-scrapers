name: Nightly BTP Scrape

on:
  schedule:
    # Every night at 2am Paris time (0am UTC in winter, 12am in summer)
    - cron: '0 0 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3 hours max

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install scrapy rapidfuzz unidecode sqlalchemy psycopg2-binary python-dotenv requests

      - name: Run Brico Dépôt spider
        run: |
          python -m scrapy crawl brico_depot -s LOG_LEVEL=INFO -s DOWNLOAD_DELAY=0.5 -s CONCURRENT_REQUESTS_PER_DOMAIN=5 2>&1 | tail -30
        continue-on-error: true

      - name: Run Tollens spider
        run: |
          python -m scrapy crawl tollens -s LOG_LEVEL=INFO 2>&1 | tail -20
        continue-on-error: true

      - name: Run Sobrico spider
        run: |
          python -m scrapy crawl sobrico -s LOG_LEVEL=INFO 2>&1 | tail -20
        continue-on-error: true

      - name: Run MaterielElectrique spider
        run: |
          python -m scrapy crawl materiel_electrique -s LOG_LEVEL=INFO 2>&1 | tail -20
        continue-on-error: true

      - name: Run Würth spider
        run: |
          python -m scrapy crawl wurth -s LOG_LEVEL=INFO -s DOWNLOAD_DELAY=2.5 2>&1 | tail -20
        continue-on-error: true

      - name: Run Distriartisan spider
        run: |
          python -m scrapy crawl distriartisan -s LOG_LEVEL=INFO -s DOWNLOAD_DELAY=2.0 2>&1 | tail -20
        continue-on-error: true

      - name: Run matcher
        run: |
          python -m pipeline.matcher --fix
        continue-on-error: true

      - name: Extract specs & update denormalized fields
        run: |
          python -c "
          import sqlite3, json, sys
          sys.path.insert(0, '.')
          from pipeline.spec_extractor import extract_specs

          db = sqlite3.connect('data/btp_comparateur.db')
          c = db.cursor()
          products = c.execute('SELECT id, name FROM products WHERE specifications IS NULL').fetchall()
          for pid, name in products:
              specs = extract_specs(name)
              if specs:
                  c.execute('UPDATE products SET specifications=?, volume=?, color=?, weight=?, dimensions=?, pack_size=?, finish=? WHERE id=?',
                      (json.dumps(specs, ensure_ascii=False), specs.get('volume'), specs.get('color'), specs.get('weight'),
                       specs.get('dimensions'), specs.get('pack_size'), specs.get('finish'), pid))
          db.commit()

          # Update denormalized fields
          for row in c.execute('SELECT id FROM products').fetchall():
              pid = row[0]
              stats = c.execute('SELECT MIN(current_price), MAX(current_price), COUNT(*) FROM store_listings WHERE product_id=?', (pid,)).fetchone()
              c.execute('UPDATE products SET min_price=?, max_price=?, listing_count=? WHERE id=?', (stats[0], stats[1], stats[2], pid))
          db.commit()

          total = c.execute('SELECT COUNT(*) FROM products WHERE listing_count > 0').fetchone()[0]
          listings = c.execute('SELECT COUNT(*) FROM store_listings').fetchone()[0]
          print(f'Done: {total} active products, {listings} listings')
          db.close()
          "

      - name: Sync to Neon
        if: env.DATABASE_URL != ''
        run: |
          python -c "
          import sqlite3, psycopg2, json, os

          neon_url = os.environ['DATABASE_URL']
          db = sqlite3.connect('data/btp_comparateur.db')
          db.row_factory = sqlite3.Row

          conn = psycopg2.connect(neon_url)
          c = conn.cursor()

          # Sync products
          products = [dict(r) for r in db.execute('SELECT * FROM products').fetchall()]
          for p in products:
              c.execute('''INSERT INTO products (id, name, canonical_name, slug, ean, brand, manufacturer,
                  manufacturer_ref, category_id, unit, description, image_url, specifications,
                  volume, color, weight, dimensions, pack_size, finish,
                  min_price, max_price, listing_count)
                  VALUES (%s,%s,%s,%s,%s,%s,%s,%s,%s,%s,%s,%s,%s,%s,%s,%s,%s,%s,%s,%s,%s,%s)
                  ON CONFLICT (id) DO UPDATE SET
                  name=EXCLUDED.name, slug=EXCLUDED.slug, min_price=EXCLUDED.min_price,
                  max_price=EXCLUDED.max_price, listing_count=EXCLUDED.listing_count,
                  specifications=EXCLUDED.specifications, volume=EXCLUDED.volume, color=EXCLUDED.color,
                  weight=EXCLUDED.weight, dimensions=EXCLUDED.dimensions, pack_size=EXCLUDED.pack_size,
                  finish=EXCLUDED.finish''',
                  (p['id'], p['name'], p.get('canonical_name'), p['slug'], p.get('ean'),
                   p.get('brand'), p.get('manufacturer'), p.get('manufacturer_ref'),
                   p.get('category_id'), p.get('unit'), p.get('description'), p.get('image_url'),
                   p.get('specifications'), p.get('volume'), p.get('color'), p.get('weight'),
                   p.get('dimensions'), p.get('pack_size'), p.get('finish'),
                   p.get('min_price'), p.get('max_price'), p.get('listing_count', 0)))

          # Sync listings
          listings = [dict(r) for r in db.execute('SELECT id, product_id, current_price, store_product_name FROM store_listings').fetchall()]
          for l in listings:
              c.execute('UPDATE store_listings SET product_id=%s, current_price=%s, store_product_name=%s WHERE id=%s',
                  (l['product_id'], l['current_price'], l['store_product_name'], l['id']))

          conn.commit()
          conn.close()
          db.close()
          print(f'Synced {len(products)} products and {len(listings)} listings to Neon')
          "

      - name: Print summary
        run: |
          python -c "
          import sqlite3
          db = sqlite3.connect('data/btp_comparateur.db')
          c = db.cursor()
          print('=== SCRAPE SUMMARY ===')
          print(f'Products: {c.execute(\"SELECT COUNT(*) FROM products\").fetchone()[0]}')
          print(f'Listings: {c.execute(\"SELECT COUNT(*) FROM store_listings\").fetchone()[0]}')
          for r in c.execute('SELECT s.chain, COUNT(sl.id) FROM store_listings sl JOIN stores s ON sl.store_id=s.id GROUP BY s.chain ORDER BY COUNT(sl.id) DESC'):
              print(f'  {r[0]}: {r[1]}')
          db.close()
          "
