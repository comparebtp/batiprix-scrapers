name: Nightly BTP Scrape

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  brico-depot:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: pip install scrapy rapidfuzz unidecode sqlalchemy psycopg2-binary python-dotenv requests
      - run: python -c "from db.models import init_db; init_db()"
      - run: python db/seed.py || true
      - name: Scrape
        run: python -m scrapy crawl brico_depot -s LOG_LEVEL=INFO -s DOWNLOAD_DELAY=0.5 -s CONCURRENT_REQUESTS_PER_DOMAIN=5 2>&1 | tail -30

  tollens:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: pip install scrapy rapidfuzz unidecode sqlalchemy psycopg2-binary python-dotenv requests
      - run: python -c "from db.models import init_db; init_db()"
      - run: python db/seed.py || true
      - name: Scrape
        run: python -m scrapy crawl tollens -s LOG_LEVEL=INFO 2>&1 | tail -20

  sobrico:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: pip install scrapy rapidfuzz unidecode sqlalchemy psycopg2-binary python-dotenv requests
      - run: python -c "from db.models import init_db; init_db()"
      - run: python db/seed.py || true
      - name: Scrape
        run: python -m scrapy crawl sobrico -s LOG_LEVEL=INFO 2>&1 | tail -20

  materiel-electrique:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: pip install scrapy rapidfuzz unidecode sqlalchemy psycopg2-binary python-dotenv requests
      - run: python -c "from db.models import init_db; init_db()"
      - run: python db/seed.py || true
      - name: Scrape
        run: python -m scrapy crawl materiel_electrique -s LOG_LEVEL=INFO 2>&1 | tail -20

  wurth:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: pip install scrapy rapidfuzz unidecode sqlalchemy psycopg2-binary python-dotenv requests
      - run: python -c "from db.models import init_db; init_db()"
      - run: python db/seed.py || true
      - name: Scrape
        run: python -m scrapy crawl wurth -s LOG_LEVEL=INFO -s DOWNLOAD_DELAY=2.5 2>&1 | tail -20

  distriartisan:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: pip install scrapy rapidfuzz unidecode sqlalchemy psycopg2-binary python-dotenv requests
      - run: python -c "from db.models import init_db; init_db()"
      - run: python db/seed.py || true
      - name: Scrape
        run: python -m scrapy crawl distriartisan -s LOG_LEVEL=INFO -s DOWNLOAD_DELAY=2.0 2>&1 | tail -20

  # After all spiders: run matcher + specs + update denormalized fields
  post-process:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [brico-depot, tollens, sobrico, materiel-electrique, wurth, distriartisan]
    if: always()
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: pip install scrapy rapidfuzz unidecode sqlalchemy psycopg2-binary python-dotenv requests

      - name: Run matcher
        run: python -m pipeline.matcher --fix
        continue-on-error: true

      - name: Extract specs & update fields
        run: |
          python -c "
          import os, sys, json
          sys.path.insert(0, '.')
          os.environ.setdefault('DATABASE_URL', '')
          from db.models import get_session, Product
          from pipeline.spec_extractor import extract_specs, specs_to_json

          session = get_session()
          products = session.query(Product).filter(Product.specifications.is_(None)).all()
          print(f'Products without specs: {len(products)}')
          for p in products:
              specs = extract_specs(p.name)
              if specs:
                  p.specifications = specs_to_json(specs)
                  if specs.get('volume'): p.volume = specs['volume'][:20]
                  if specs.get('color'): p.color = specs['color'][:50]
                  if specs.get('weight'): p.weight = specs['weight'][:20]
                  if specs.get('dimensions'): p.dimensions = specs['dimensions'][:50]
                  if specs.get('pack_size'): p.pack_size = specs['pack_size'][:30]
                  if specs.get('finish'): p.finish = specs['finish'][:30]
          session.commit()

          # Update denormalized fields
          from sqlalchemy import func
          from db.models import StoreListing
          all_products = session.query(Product).all()
          for p in all_products:
              stats = session.query(
                  func.min(StoreListing.current_price),
                  func.max(StoreListing.current_price),
                  func.count(StoreListing.id)
              ).filter(StoreListing.product_id == p.id).first()
              p.min_price = stats[0]
              p.max_price = stats[1]
              p.listing_count = stats[2]
          session.commit()

          # Migrate EAN from manufacturer_ref
          listings = session.query(StoreListing).filter(
              StoreListing.store_manufacturer_ref.isnot(None),
              StoreListing.store_ean.is_(None),
              func.length(StoreListing.store_manufacturer_ref) == 13
          ).all()
          for l in listings:
              if l.store_manufacturer_ref.isdigit():
                  l.store_ean = l.store_manufacturer_ref
                  l.store_manufacturer_ref = None
          session.commit()

          total = session.query(Product).filter(Product.listing_count > 0).count()
          total_l = session.query(StoreListing).count()
          print(f'Done: {total} active products, {total_l} listings')
          session.close()
          "
        continue-on-error: true

      - name: Print summary
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from db.models import get_session, Product, StoreListing, Store
          from sqlalchemy import func

          session = get_session()
          print('=== SCRAPE SUMMARY ===')
          print(f'Products: {session.query(Product).count()}')
          print(f'Listings: {session.query(StoreListing).count()}')
          for chain, cnt in session.query(Store.chain, func.count(StoreListing.id)).join(StoreListing).group_by(Store.chain).order_by(func.count(StoreListing.id).desc()).all():
              print(f'  {chain}: {cnt}')
          session.close()
          "
