name: Nightly BTP Scrape

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  brico-depot-nice-0:
    runs-on: ubuntu-latest
    timeout-minutes: 200
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BD_STORE_ID: '1944'
      BD_STORE_PATH: 'nice-lingostiere'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: pip install scrapy rapidfuzz unidecode sqlalchemy psycopg2-binary python-dotenv requests
      - run: python -c "from db.models import init_db; init_db()"
      - run: python db/seed.py || true
      - name: Scrape Brico Dépôt Nice shard 0/2
        run: python -m scrapy crawl brico_depot -a store_id=1944 -a store_path=nice-lingostiere -a shard=0 -a total_shards=2 -s LOG_LEVEL=INFO -s DOWNLOAD_DELAY=0.5 -s CONCURRENT_REQUESTS_PER_DOMAIN=5 2>&1 | tail -30

